<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Prevent fetch from being overwritten by polyfills which causes errors in environments where fetch is a getter-only
      let _originalFetch = window.fetch;
      try {
        Object.defineProperty(window, 'fetch', {
          get: function() { return _originalFetch; },
          set: function(val) { console.warn("Prevented overwriting window.fetch"); },
          configurable: true
        });
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
